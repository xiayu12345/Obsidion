site_name: Obsidion
site_url: https://xiayu12345.github.io/Obsidion/
repo_url: https://github.com/xiayu12345/Obsidion
docs_dir: docs
site_dir: site
theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
plugins:
  - search:
      lang:
        - zh
        - en
extra_css:
  - stylesheets/extra.css
nav:
  - Career 笔记索引: index.md
  - BK7252N AI打印机:
      - 项目主页: BK7252N-AI打印机/BK7252N-AI打印机.md
  - H133:
      - 项目速览:
          - 基本信息: H133/项目速览/基本信息.md
          - 硬件平台: H133/项目速览/硬件平台.md
          - 软件平台: H133/项目速览/软件平台.md
          - 代码仓库: H133/项目速览/代码仓库.md
      - 硬件接线:
          - 硬件接线: H133/硬件接线/硬件接线.md
      - 开发环境:
          - 环境搭建: H133/开发环境/环境搭建.md
      - 代码结构:
          - 目录树: H133/代码结构/目录树.md
          - 主程序入口: H133/代码结构/主程序入口.md
          - 关键配置文件: H133/代码结构/关键配置文件.md
          - 驱动层结构: H133/代码结构/驱动层结构.md
          - 应用层结构: H133/代码结构/应用层结构.md
          - 任务线程列表: H133/代码结构/任务线程列表.md
      - 开发记录:
          - 开发记录索引: H133/开发记录/index.md
          - 驱动开发:
              - 驱动开发索引: H133/开发记录/驱动开发/index.md
              - 显示 / HDMI / MIPI: H133/开发记录/驱动开发/显示-HDMI-MIPI.md
              - G2D / 显示 ABI: H133/开发记录/驱动开发/G2D显示ABI.md
              - 触摸 / 输入: H133/开发记录/驱动开发/触摸输入.md
              - 音频 / 功放: H133/开发记录/驱动开发/音频功放.md
              - WiFi / 网络: H133/开发记录/驱动开发/WiFi网络.md
              - 存储 / SD 卡: H133/开发记录/驱动开发/存储SD卡.md
              - 视频旋转 / TPlayer: H133/开发记录/驱动开发/视频旋转TPlayer.md
          - 应用开发:
              - 应用开发索引: H133/开发记录/应用开发/index.md
              - lv_projector 主应用: H133/开发记录/应用开发/lv_projector.md
              - 烧录部署 / ADB 替换: H133/开发记录/应用开发/烧录部署.md
              - SFTP / OpenSSH 集成: H133/开发记录/应用开发/SFTP开发.md
              - rootfs 空间与应用占用: H133/开发记录/应用开发/rootfs空间.md
      - 测试记录:
          - 测试记录索引: H133/测试记录/index.md
          - 硬件连通性测试: H133/测试记录/硬件连通性测试.md
          - 系统启动测试: H133/测试记录/系统启动测试.md
          - 显示测试: H133/测试记录/显示测试.md
          - 应用测试: H133/测试记录/应用测试.md
          - 回归测试: H133/测试记录/回归测试.md
      - 踩坑记录: H133/踩坑记录/index.md
      - 常用命令速查:
          - 编译相关: H133/常用命令速查/编译相关.md
          - 烧录相关: H133/常用命令速查/烧录相关.md
          - 调试相关: H133/常用命令速查/调试相关.md
          - 串口日志相关: H133/常用命令速查/串口日志相关.md
          - Git相关: H133/常用命令速查/Git相关.md
      - 硬件资料:
          - 硬件资料入口: H133/硬件资料/index.md
          - 拓步 10.1 寸: H133/硬件资料/拓步10.1寸/index.md
          - 吴明才 12.1 寸: H133/硬件资料/吴明才12.1寸/index.md
          - 欣欣智能: H133/硬件资料/欣欣智能/index.md
          - 通用资料: H133/硬件资料/通用资料/index.md
      - 引脚定义速查: H133/引脚定义速查/index.md
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
extra:
  generator: false
