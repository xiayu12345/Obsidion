site_name: Obsidion
site_url: https://xiayu12345.github.io/Obsidion/
repo_url: https://github.com/xiayu12345/Obsidion
docs_dir: docs
site_dir: site
theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
plugins:
  - search:
      lang:
        - zh
        - en
extra_css:
  - stylesheets/extra.css
nav:
  - Career 笔记索引: index.md
  - BK7252N AI打印机:
      - 项目主页: BK7252N-AI打印机/BK7252N-AI打印机.md
  - H133:
      - 项目速览:
          - 基本信息: H133/项目速览/基本信息.md
          - 硬件平台: H133/项目速览/硬件平台.md
          - 软件平台: H133/项目速览/软件平台.md
          - 代码仓库: H133/项目速览/代码仓库.md
      - 硬件接线:
          - 硬件接线: H133/硬件接线/硬件接线.md
      - 开发环境:
          - 环境搭建: H133/开发环境/环境搭建.md
      - 代码结构:
          - 目录树: H133/代码结构/目录树.md
          - 主程序入口: H133/代码结构/主程序入口.md
          - 关键配置文件: H133/代码结构/关键配置文件.md
          - 驱动层结构: H133/代码结构/驱动层结构.md
          - 应用层结构: H133/代码结构/应用层结构.md
          - 任务线程列表: H133/代码结构/任务线程列表.md
      - 开发记录: H133/开发记录/index.md
      - 踩坑记录: H133/踩坑记录/index.md
      - 常用命令速查:
          - 编译相关: H133/常用命令速查/编译相关.md
          - 烧录相关: H133/常用命令速查/烧录相关.md
          - 调试相关: H133/常用命令速查/调试相关.md
          - 串口日志相关: H133/常用命令速查/串口日志相关.md
          - Git相关: H133/常用命令速查/Git相关.md
      - 硬件资料:
          - 数据手册: H133/硬件资料/数据手册.md
          - 原理图: H133/硬件资料/原理图.md
          - PCB布局图: H133/硬件资料/PCB布局图.md
          - 实物照片: H133/硬件资料/实物照片.md
      - 引脚定义速查: H133/引脚定义速查/index.md
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
extra:
  generator: false
