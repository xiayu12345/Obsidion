site_name: Obsidion
site_url: https://xiayu12345.github.io/Obsidion/
repo_url: https://github.com/xiayu12345/Obsidion
docs_dir: docs
site_dir: site
theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
plugins:
  - search:
      lang:
        - zh
        - en
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
extra:
  generator: false
